<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@600;700;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#EFE7D8; --bg2:#E7DDC9; --surface:#FCFAF4; --surface2:#F6EFE2;
    --ink:#2C2822; --sub:#675E51; --muted:#9C9180; --line:#E2D8C5; --lineS:#D6C9B2;
    --a:#2F7E78; --aD:#235E59; --aT:#E6F0EE; --aT2:#D2E6E2; --aInk:#1d4b47;
    --gold:#B98a3e; --goldT:#f3e9d6;
    --peer:#5B6FA8;
    --warn:#B0573f;
    --shadow:0 1px 2px rgba(60,48,30,.05), 0 6px 20px rgba(60,48,30,.06);
    --shadowS:0 1px 2px rgba(60,48,30,.06);
    --r:14px;
  }
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:"Noto Sans TC",system-ui,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.5}
  .app-root{min-height:100vh}
  .serif{font-family:"Noto Serif TC","Noto Sans TC",serif}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:var(--lineS);border-radius:6px;border:2px solid var(--bg)}

  /* ---- shell ---- */
  .shell{min-height:100vh;display:flex;flex-direction:column}
  .topbar{position:sticky;top:0;z-index:40;background:rgba(252,250,244,.88);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:16px;padding:10px 20px}
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .brand-mark{width:38px;height:38px;border-radius:11px;background:linear-gradient(150deg,var(--a),var(--aD));color:#fff;display:grid;place-items:center;font-weight:900;flex:none;box-shadow:0 3px 8px rgba(35,94,89,.28)}
  .brand-mark span{font-size:17px;letter-spacing:.5px}
  .brand-txt{min-width:0}
  .brand-txt b{font-size:15px;font-weight:700;display:block;letter-spacing:.2px;white-space:nowrap}
  .brand-txt small{font-size:11.5px;color:var(--muted);white-space:nowrap}
  .topbar-spacer{flex:1}
  .role-seg{display:flex;background:var(--surface2);border:1px solid var(--line);border-radius:11px;padding:4px;gap:3px}

  /* buttons */
  .btn{display:inline-flex;align-items:center;gap:8px;padding:11px 18px;border-radius:11px;font-size:14px;font-weight:700;transition:.15s;white-space:nowrap}

  .chip.stage{background:var(--aT);color:var(--aInk);border-color:transparent}
  .chip.gold{background:var(--goldT);color:#7d5a20;border-color:transparent}

  .mini-stats{display:flex;gap:10px}
  .mini{flex:1;background:var(--surface2);border-radius:10px;padding:9px 11px}

  .mini .v{font-size:19px;font-weight:900;margin-top:1px;line-height:1.1}

  .progressbar{height:7px;border-radius:6px;background:var(--bg2);overflow:hidden}
  .progressbar i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--a),var(--aD))}

  /* EPA dot row */
  .epa-dots{display:flex;gap:6px;flex-wrap:wrap}
  .epa-dot{flex:1;min-width:54px;border-radius:9px;padding:7px 6px;text-align:center;background:var(--surface2);border:1px solid var(--line)}
  .epa-dot .lab{font-size:10.5px;color:var(--muted);font-weight:700}

  /* segmented / pills generic */
  .seg{display:inline-flex;background:var(--surface2);border:1px solid var(--line);border-radius:11px;padding:4px;gap:3px;flex-wrap:wrap}

  /* form */
  .form-sec{padding:20px 22px;margin-bottom:16px}

  .report-paper{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}

  .empty{text-align:center;padding:54px 20px;color:var(--muted)}

  .feed-item{padding:16px 18px;border-left:3px solid var(--a);background:var(--surface2);border-radius:0 11px 11px 0;margin-bottom:12px}
  .feed-item .fh{display:flex;justify-content:space-between;gap:10px;font-size:12.5px;color:var(--muted);margin-bottom:6px;flex-wrap:wrap}
  .feed-item .fh b{color:var(--aInk);font-weight:700}
  .feed-item p{font-size:13.5px;line-height:1.7;color:var(--sub)}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 22px;border-radius:12px;font-size:13.5px;font-weight:600;z-index:90;box-shadow:0 8px 24px rgba(0,0,0,.25);animation:rise .3s ease}
  @keyframes rise{from{opacity:0;transform:translate(-50%,12px)}to{opacity:1;transform:translate(-50%,0)}}
  @keyframes fade{from{transform:translateY(8px)}to{transform:translateY(0)}}
  .fade{animation:fade .28s ease}

  @media(max-width:860px){
    .sidebar{display:none}
    .topbar{padding:9px 14px;gap:10px;flex-wrap:wrap}

    .actionbar{margin-left:-15px;margin-right:-15px;padding:12px 15px}
  }
  @media(max-width:560px){
    .brand-txt small{display:none}
    .mini-stats{flex-wrap:wrap}
  }

  /* print: only the report */
  @media print{
    @page{margin:14mm}
    body{background:#fff}
    .topbar,.sidebar,.tabsnav,.actionbar,.no-print{display:none !important}
    .wrap{padding:0;max-width:none}
    .report-paper{border:none;box-shadow:none;border-radius:0}
    .report-band{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .lvpill,.rep-overall,.report-band{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  }

// ====== 設定 ======
// 與評核介面相同的 Apps Script 網址（讀取同一份試算表）
const SHEET_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbzOqZMa5P4CidoUIDSVsIep2GDonzpnKXxXizgXgMQSWhW_nbKPqfOh9r3mX0xr3jJ_/exec';
// 進入管理端的密碼
const ADMIN_PIN = 'tmuh-epa';

class Component extends DCLogic {
  state = {
    loading:true, authed:false, pinInput:'', loadError:'',
    role:'student', layout:'sidebar',
    sStudent:'', sEpa:'ALL',
    mSort:'name', mSel:[], mChart:'trend',
    students:[], teachers:[], assessments:[],
    toast:null,
  };

  get sheetUrl(){ return ((this.props.sheetUrl||'') || SHEET_WEBAPP_URL || '').trim(); }

  loadData(){
    if(typeof location!=='undefined' && /[?&]demo/.test(location.search)){
      const D=this.D;
      const students=D.STUDENTS.map(s=>({id:s.name,name:s.name,stage:D.deriveStage(s.track,s.startDate),active:true}));
      const assessments=D.SEED_ASSESSMENTS.map((a,i)=>({
        id:'a'+i, studentId:D.studentById[a.studentId].name, epaId:a.epaId, date:a.date, _ts:a._ts,
        stage:a.stage, evaluator:a.evaluator, overall:a.overall, items:a.items,
        context:a.context, qualitative:a.qualitative
      })).sort((x,y)=>x._ts-y._ts);
      this.setState({loading:false, students, teachers:D.TEACHERS.slice(), assessments, sStudent:this.state.sStudent||(students[0]&&students[0].id)});
      return;
    }
    if(!this.sheetUrl){ this.setState({loading:false, loadError:'未設定試算表網址'}); return; }
    this.setState({loading:true, loadError:''});
    fetch(this.sheetUrl+'?action=alldata').then(r=>r.json()).then(r=>{
      if(!r||!r.ok) throw new Error((r&&r.error)||'load failed');
      const students=(r.students||[]).map(s=>({ id:s.name, name:s.name, stage:s.stage||'PGY1', active:s.active!==false }));
      const assessments=(r.assessments||[]).map((a,i)=>this.toAssessment(a,i)).filter(Boolean).sort((x,y)=>x._ts-y._ts);
      const firstStu = students[0]? students[0].id : '';
      this.setState({loading:false, students, teachers:r.teachers||[], assessments, sStudent:this.state.sStudent||firstStu});
    }).catch(e=>{ this.setState({loading:false, loadError:'無法讀取資料，請檢查網路與部署設定'}); });
  }
  // 將試算表一列轉為內部 assessment 物件
  toAssessment(a, i){
    const D=this.D;
    const epaId = (a.epa||'').replace(/\s/g,''); // 'EPA1'
    if(!D.epaById[epaId]) return null;
    const ts = a.date? new Date(a.date).getTime() : (a.submitted? new Date(a.submitted).getTime() : Date.now()-i);
    const splitList = s=> (s||'').split(/[、,]/).map(x=>x.trim()).filter(Boolean);
    return {
      id:'a'+i, studentId:a.student, epaId, date:a.date||'', _ts: isNaN(ts)?Date.now()-i:ts,
      stage:a.stage||'PGY1', evaluator:a.evaluator||'',
      overall:(a.overall||'').trim(),
      items:[],
      context:{ diagnosis:splitList(a.diagnosis), diagnosisOther:'', assessItems:splitList(a.assessItems),
        source:a.source||'', dept:a.dept||'', ward:a.ward||'', reportType:a.reportType||'' },
      qualitative:a.qualitative||''
    };
  }

  componentDidMount(){
    Promise.resolve(window.EPA_DATA).then(D=>{ this.D = D; this.loadData(); });
    const pal = PALETTES[this.props.accent] || PALETTES.teal;
    Object.entries(pal).forEach(([k,v])=>document.documentElement.style.setProperty('--'+k, v));
  }
  componentDidUpdate(prev){
    if(prev.accent!==this.props.accent){
      const pal = PALETTES[this.props.accent] || PALETTES.teal;
      Object.entries(pal).forEach(([k,v])=>document.documentElement.style.setProperty('--'+k, v));
    }
  }

  // ---- helpers ----
  decorate(s){ return s; }
  allStudents(){ return (this.state.students||[]); }
  students(){ return this.allStudents().filter(s=>s.active!==false); }
  stuById(id){ return (this.state.students||[]).find(x=>x.id===id) || null; }
  teachers(){ return this.state.teachers||[]; }
  studentAssessments(sid){ return (this.state.assessments||[]).filter(a=>a.studentId===sid).sort((a,b)=>a._ts-b._ts); }
  latestPerEpa(sid){
    const D=this.D, out={};
    D.EPAS.forEach(e=>{
      const arr=this.studentAssessments(sid).filter(a=>a.epaId===e.id);
      out[e.id]= arr.length? arr[arr.length-1] : null;
    });
    return out;
  }
  overallVal(a){ return a? this.D.valByCode[a.overall] : null; }
  studentLatestMean(sid){
    const lp=this.latestPerEpa(sid); const vals=Object.values(lp).filter(Boolean).map(a=>this.overallVal(a)).filter(v=>v!=null);
    return vals.length? vals.reduce((x,y)=>x+y,0)/vals.length : null;
  }
  // 代表等級：取該學員所有評核中「整體任務」出現最多次的等級代碼（同次數時取較高等級）
  studentModeOverall(sid){
    const D=this.D; const arr=this.studentAssessments(sid).map(a=>a.overall).filter(c=>c&&c!=='NA');
    if(!arr.length) return null;
    const cnt={}; arr.forEach(c=>{cnt[c]=(cnt[c]||0)+1;});
    let best=null,bn=-1;
    Object.keys(cnt).forEach(c=>{ const n=cnt[c]; if(n>bn || (n===bn && D.valByCode[c]>D.valByCode[best])){best=c;bn=n;} });
    return best;
  }
  studentModeVal(sid){ const c=this.studentModeOverall(sid); return c!=null? this.D.valByCode[c]:null; }
  studentModeCount(sid){ const c=this.studentModeOverall(sid); if(c==null)return 0; return this.studentAssessments(sid).filter(a=>a.overall===c).length; }
  // 情境（診斷）：一次評核涵蓋的診斷標籤（其它須有輸入才計入）
  contextLabelsOf(a){
    const c=a.context||{}, out=[];
    (c.diagnosis||[]).forEach(dg=>{ if(dg==='其它'){ if(c.diagnosisOther) out.push(c.diagnosisOther.trim()); } else out.push(dg); });
    return out;
  }
  // 某學員某 EPA 累計涵蓋之不同情境（診斷）集合
  epaContexts(sid, epaId){
    const set=new Set();
    this.studentAssessments(sid).filter(a=>a.epaId===epaId).forEach(a=>this.contextLabelsOf(a).forEach(l=>l&&set.add(l)));
    return set;
  }
  toast(msg){ this.setState({toast:msg}); clearTimeout(this._tt); this._tt=setTimeout(()=>this.setState({toast:null}),2200); }

  // ---- render entry ----
  renderVals(){
    return { app: this.renderRoot() };
  }

  renderRoot(){
    const {authed,toast}=this.state;
    if(!authed) return el('div',null, this.renderGate(), toast ? el('div','toast', toast) : null);
    return this.renderApp();
  }

  renderGate(){
    return h('div',{style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'20px'}},
      h('div',{className:'card',style:{padding:'30px 32px',maxWidth:380,textAlign:'center'}},
        h('div',{className:'brand-mark',style:{width:54,height:54,borderRadius:15,margin:'0 auto 16px'}}, h('span',{style:{fontSize:22}},'EPA')),
        h('h2',{className:'serif',style:{fontSize:21,fontWeight:900,marginBottom:6}},'學員趨勢與訓練管理'),
        h('p',{style:{fontSize:13,color:'var(--muted)',marginBottom:20}},'此區為負責老師專用，請輸入管理者密碼。'),
        h('input',{className:'input',type:'password',value:this.state.pinInput,placeholder:'管理者密碼',
          style:{textAlign:'center'},
          onChange:e=>this.setState({pinInput:e.target.value}),
          onKeyDown:e=>{if(e.key==='Enter')this.tryAuth();}}),
        h('button',{className:'btn btn-primary',style:{marginTop:14,width:'100%',justifyContent:'center'},onClick:()=>this.tryAuth()}, icon('chart'),'進入'))
    );
  }
  tryAuth(){
    if(this.state.pinInput===ADMIN_PIN) this.setState({authed:true, pinInput:''});
    else this.toast('密碼錯誤');
  }

  renderApp(){
    const {toast}=this.state;
    return el('div','shell',
      this.renderTopbar(),
      h('div',{className:'body'},
        this.renderSidebar(),
        h('div',{className:'main'},
          this.state.loading? h('div',{className:'empty',style:{paddingTop:80}}, icon('chart'), h('div',null,'讀取試算表資料中…'))
          : this.state.loadError? h('div',{className:'empty',style:{paddingTop:80}}, icon('flag'),
              h('div',null,this.state.loadError),
              h('button',{className:'btn btn-ghost btn-sm',style:{marginTop:14},onClick:()=>this.loadData()},'重新載入'))
          : !this.state.assessments.length? h('div',{className:'empty',style:{paddingTop:80}}, icon('doc'),
              h('div',null,'試算表中尚無評核資料'),
              h('div',{style:{fontSize:12,marginTop:6}},'待臨床教師送出評核後即可在此查看趨勢。'))
          : this.renderContent()
        )
      ),
      toast ? el('div','toast', toast) : null
    );
  }

  renderTopbar(){
    const {role}=this.state;
    const roles=[['student','學員趨勢','student'],['manager','訓練管理','manager']];
    return el('header','topbar',
      el('div','brand',
        h('div',{className:'brand-mark'}, h('span',null,'EPA')),
        el('div','brand-txt', h('b',null,'生理職能治療 · 學員趨勢與訓練管理'), h('small',null,'臺北醫學大學附設醫院 · 資料來源：評核試算表'))
      ),
      el('div','topbar-spacer'),
      h('div',{className:'role-seg'},
        roles.map(([k,label,ic])=>h('button',{key:k,className:role===k?'on':'',onClick:()=>this.setState({role:k})},
          icon(ic), h('span',{className:'t'},label)))
      ),
      h('button',{className:'btn btn-ghost btn-sm',onClick:()=>this.loadData()}, '↻ 重新整理')
    );
  }

  renderSidebar(){
    const {role}=this.state;
    return el('aside','sidebar',
      el('div','side-h', role==='manager'?'管理總覽':'學員檢視'),
      role==='student'? this.students().map(s=>h('button',{key:s.id,className:'nav-item '+(this.state.sStudent===s.id?'on':''),onClick:()=>this.setState({sStudent:s.id})},
        icon('user'), s.name, h('span',{className:'badge'},s.stage))) : null,
      role==='manager'? h('button',{className:'nav-item on'}, icon('chart'),'學員概況') : null,
      el('div','side-foot','信賴等級 1a–5（5 分為滿分）。趨勢以「整體任務」換算：1a=1、1b=1.5、2a=2、2b=2.5、3a=3、3b=3.5、3c=3.75、4=4、5=5。')
    );
  }

  renderContent(){
    const {role}=this.state;
    if(role==='manager') return this.renderManager();
    return this.renderStudent();
  }

  // ---- TEACHER ----
  renderTeacher(){
    const {tView}=this.state;
    if(tView==='form') return this.renderForm();
    if(tView==='report') return this.renderReport();
    return this.renderTeacherList();
  }

  renderTeacherList(){
    const D=this.D;
    return el('div','wrap fade',
      el('div','page-head',
        el('div',null, el('div','eyebrow','臨床教師工作區'),
          h('h1',null,'學員與即時評核'),
          h('p',null,'於工作情境中選擇學員，針對任一 EPA 立即評核；送出後可產生單次報告並下載。')),
        h('button',{className:'btn btn-primary btn-lg',onClick:()=>this.startAssessment(null)}, icon('plus'),'立即評核')
      ),
      h('div',{className:'grid stu-grid'},
        this.students().map(s=>this.studentCard(s))
      )
    );
  }

  studentCard(s){
    const D=this.D;
    const all=this.studentAssessments(s.id);
    const repCode=this.studentModeOverall(s.id);
    const repV=repCode!=null? D.valByCode[repCode]:null;
    const target=D.TARGET[s.stage];
    const lp=this.latestPerEpa(s.id);
    const pct = repV!=null? Math.round(repV/5*100):0;
    return h('div',{key:s.id,className:'card stu-card',onClick:()=>this.startAssessment(s.id)},
      el('div','stu-top',
        el('div','avatar', s.name[0]),
        el('div',null, el('div','stu-name',s.name),
          el('div','stu-meta',
            h('span',{className:'chip stage'},s.stage),
            h('span',null,'年資 '+D.fmtYears(s.years)),
          ))
      ),
      el('div','mini-stats',
        el('div','mini', el('div','k','代表等級'), h('div',{className:'v'}, repCode||'—', repCode? h('small',null,' '+D.lvForCode(repCode)):null)),
        el('div','mini', el('div','k','評核次數'), h('div',{className:'v'}, all.length)),
        el('div','mini', el('div','k','期望等級'), h('div',{className:'v'}, D.TARGET_LABEL[s.stage]))
      ),
      el('div',null,
        el('div',{className:'epa-dots'},
          D.EPAS.map(e=>{
            const a=lp[e.id]; const v=this.overallVal(a);
            return h('div',{key:e.id,className:'epa-dot'+(v==null?' na':'')},
              el('div','lab',e.short),
              h('div',{className:'num'}, v!=null? D.codeByVal[v]:'—'));
          })
        )
      ),
      h('div',{className:'progressbar',title:'近期整體 '+pct+'%'}, h('i',{style:{width:pct+'%'}})),
      h('button',{className:'btn btn-soft btn-sm',style:{alignSelf:'flex-start'},onClick:(e)=>{e.stopPropagation();this.startAssessment(s.id);}}, icon('plus'),'立即評核')
    );
  }

  startAssessment(sid){
    const D=this.D;
    const today=new Date();
    const stu = sid? this.stuById(sid) : null;
    this.setState({ tView:'form', selStudent:sid, draft:{
      epaId:'EPA1', studentId:sid||'', date: today.toISOString().slice(0,10),
      evaluator: '', stage: stu? stu.stage:'PGY1', years: stu? stu.years:0.5,
      context:{ diagnosis:[], diagnosisOther:'', assessItems:[], source:'OPD', dept:'', ward:'', reportType:'初評報告' },
      overall:null, items:[], qualitative:''
    }});
  }

  setDraft(mut){
    const d = JSON.parse(JSON.stringify(this.state.draft));
    mut(d);
    this.setState({draft:d});
  }
  toggleArr(arr,v){ const i=arr.indexOf(v); if(i<0)arr.push(v); else arr.splice(i,1); }
  pickEpa(id){
    this.setDraft(d=>{ d.epaId=id; d.overall=null; d.items=[]; });
  }
  draftDone(){
    const d=this.state.draft; const epa=this.D.epaById[d.epaId];
    let filled = d.items.filter(x=>x).length;
    return {filled, total: epa.items.length, overallSet: !!d.overall};
  }
  submitAssessment(){
    const d=this.state.draft; const D=this.D;
    if(!d.studentId){ this.toast('請先選擇受評學員'); return; }
    if(!d.evaluator || !d.evaluator.trim()){ this.toast('請先輸入評核者（老師姓名）'); return; }
    if(!d.overall){ this.toast('請先評定「整體任務」之信賴等級'); return; }
    const stu=this.stuById(d.studentId);
    const rec={ ...JSON.parse(JSON.stringify(d)),
      id:'a'+Date.now(), _ts:new Date(d.date).getTime(),
      stage:stu.stage, years:stu.years,
      items: d.items.length? d.items : D.epaById[d.epaId].items.map(()=> 'NA'),
    };
    // 新增評核者自動加入名冊
    const ev=d.evaluator.trim();
    let teachers=this.state.teachers;
    if(ev && !teachers.includes(ev)) teachers=[...teachers, ev];
    this.setState(s=>({assessments:[...s.assessments, rec].sort((a,b)=>a._ts-b._ts), teachers, report:rec, tView:'report'}), ()=>this.saveStore());
    this.toast('評核已送出、已存檔，並產生單次報告');
  }

  // 9 級量尺選擇器
  scaleRow(value, onPick){
    const D=this.D;
    return el('div','scale',
      D.SCALE.map(s=>h('button',{key:s.code,title:s.label,className:value===s.code?'on':'',onClick:()=>onPick(s.code)},
        s.code, h('small',null,s.lv))),
      h('button',{key:'NA',title:D.NA.label,className:'na'+(value==='NA'?' on':''),onClick:()=>onPick('NA')},'NA')
    );
  }

  renderForm(){
    const D=this.D, d=this.state.draft, epa=D.epaById[d.epaId];
    const prog=this.draftDone();
    const ctxCov = d.studentId? this.epaContexts(d.studentId, epa.id) : null;
    return el('div','wrap narrow fade',
      h('button',{className:'btn btn-ghost btn-sm no-print',style:{marginBottom:16},onClick:()=>this.setState({tView:'list'})}, icon('back'),'返回學員列表'),
      el('div','page-head',
        el('div',null, el('div','eyebrow','即時評核 · Ad-hoc EPA'),
          h('h1',null,'新增評核紀錄'),
          h('p',null,'在工作情境中觀察學員後填寫；可隨時切換 EPA。')),
      ),
      // EPA 選擇
      el('div','card form-sec',
        h('h3',null, h('span',{className:'n'},'A'),'選擇 EPA 項目'),
        el('div','epa-tiles',
          D.EPAS.map(e=>h('button',{key:e.id,className:'epa-tile'+(d.epaId===e.id?' on':''),onClick:()=>this.pickEpa(e.id)},
            el('div','tag','EPA '+e.no),
            el('div','tt',e.title),
            el('div','ds',e.desc)))
        )
      ),
      // 受評對象
      el('div','card form-sec',
        h('h3',null, h('span',{className:'n'},'B'),'受評對象與情境'),
        el('div','field-row',
          el('div','field', h('label',null,'受評學員'),
            h('div',{style:{display:'flex',gap:8}},
              h('select',{className:'input',style:{flex:1},value:d.studentId,onChange:e=>this.setDraft(x=>{x.studentId=e.target.value;})},
                h('option',{value:''},'— 請選擇 —'),
                this.students().map(s=>h('option',{key:s.id,value:s.id}, s.name+'（'+s.stage+'）'))),
              h('button',{className:'btn btn-soft btn-sm',style:{flex:'none'},title:'名冊沒有此學員？快速建檔',onClick:()=>this.openStuForm(null)}, icon('plus'),'新增'))),
          el('div','field', h('label',null,'評核日期'),
            h('input',{className:'input',type:'date',value:d.date,onChange:e=>this.setDraft(x=>{x.date=e.target.value;})})),
          el('div','field', h('label',null,'評核者（老師姓名）'),
            h('input',{className:'input',list:'teachers',value:d.evaluator,placeholder:'輸入您的姓名',onChange:e=>this.setDraft(x=>{x.evaluator=e.target.value;})}),
            h('datalist',{id:'teachers'}, this.teachers().map(t=>h('option',{key:t,value:t}))))
        ),
        epa.id==='EPA4'? h('div',{className:'field',style:{marginTop:14}},
          h('label',null,'報告類型'),
          h('div',{className:'seg'}, epa.reportTypes.map(rt=>h('button',{key:rt,className:d.context.reportType===rt?'on':'',onClick:()=>this.setDraft(x=>{x.context.reportType=rt;})},rt)))
        ):null,
        h('div',{className:'field-row',style:{marginTop:14}},
          el('div','field', h('label',null,'個案來源'),
            h('div',{className:'seg'}, D.SOURCES.map(sc=>h('button',{key:sc,className:d.context.source===sc?'on':'',onClick:()=>this.setDraft(x=>{x.context.source=sc;})},sc)))),
          el('div','field', h('label',null,'科別'),
            h('input',{className:'input',list:'depts',value:d.context.dept,placeholder:'輸入或選擇科別（可自訂）',onChange:e=>this.setDraft(x=>{x.context.dept=e.target.value;})}),
            h('datalist',{id:'depts'}, D.DEPTS.map(dp=>h('option',{key:dp,value:dp})))),
          el('div','field', h('label',null,'病房'),
            h('input',{className:'input',value:d.context.ward,placeholder:'例：12B（OPD 可留空）',onChange:e=>this.setDraft(x=>{x.context.ward=e.target.value;})}))
        ),
        // 個案診斷（勾選，連動情境涵蓋）／ EPA1 另含評估項目
        h('div',{style:{marginTop:14}},
          h('div',{style:{display:'flex',alignItems:'center',gap:9,marginBottom:7,flexWrap:'wrap'}},
            h('label',{style:{fontSize:'12.5px',fontWeight:700,color:'var(--sub)'}},'個案診斷（情境）'),
            h('span',{style:{fontSize:'11.5px',color:'var(--muted)'}},'完成訓練需累計至少 '+epa.minCtx+' 種情境'),
            ctxCov!=null? h('span',{className:'chip '+(ctxCov.size>=epa.minCtx?'stage':'gold')}, '此學員已累計 '+ctxCov.size+' / '+epa.minCtx+' 種'):null
          ),
          el('div','checks', D.DIAGNOSES.map(dg=>{
            const on=d.context.diagnosis.includes(dg);
            return h('button',{key:dg,className:'checkpill'+(on?' on':''),onClick:()=>this.setDraft(x=>this.toggleArr(x.context.diagnosis,dg))},
              h('span',{className:'box'}, on?icon('check'):null), dg);
          })),
          d.context.diagnosis.includes('其它')? h('input',{className:'input',style:{marginTop:10},value:d.context.diagnosisOther,placeholder:'其它診斷：請自行輸入',onChange:e=>this.setDraft(x=>{x.context.diagnosisOther=e.target.value;})}):null
        ),
        epa.assessItems? h('div',{style:{marginTop:14}},
          h('label',{style:{display:'block',fontSize:'12.5px',fontWeight:700,color:'var(--sub)',marginBottom:6}},'評估項目'),
          el('div','checks', D.ASSESS_ITEMS.map(ai=>{
            const on=d.context.assessItems.includes(ai);

  lvColor(v){
    if(v==null) return {bg:'#ECE5D7',fg:'#8A8275'};
    if(v<2) return {bg:'#EAD3C8',fg:'#9c4a32'};
    if(v<3) return {bg:'#F1E2C4',fg:'#8a6420'};
    if(v<4) return {bg:'var(--aT2)',fg:'var(--aInk)'};
    return {bg:'var(--a)',fg:'#fff'};
  }
  ctxSummary(rec){
    const c=rec.context, parts=[];
    const dl=this.contextLabelsOf(rec);
    if(dl.length) parts.push('診斷：'+dl.join('、'));
    if(c.assessItems&&c.assessItems.length) parts.push('評估項目：'+c.assessItems.join('、'));
    return parts;
  }
  downloadFile(name, text, type){
    const blob=new Blob(['\ufeff'+text],{type:type||'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob); const a=document.createElement('a');
    a.href=url; a.download=name; document.body.appendChild(a); a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},100);
  }

  // 折線圖（學員趨勢 + 同儕趨勢 + 期望線）
  lineChart(studentPts, cohortPts, target, targetLabel){
    const D=this.D, W=760,H=300,padL=44,padR=18,padT=18,padB=42;
    const N=Math.max(studentPts.length, 1);
    const xFor=i=> padL + (N<=1?0.5:i/(N-1))*(W-padL-padR);
    const yFor=v=> padT + (1-(v-1)/4)*(H-padT-padB);
    const mkPoly=pts=> pts.map((p,i)=>xFor(i)+','+yFor(p.v)).join(' ');
    const grid=[1,2,3,4,5];
    const labelEvery=Math.max(1,Math.ceil(N/6));
    return h('svg',{viewBox:'0 0 '+W+' '+H,style:{width:'100%',height:'auto',display:'block'}},
      // y gridlines + labels
      grid.map(v=>h('g',{key:'g'+v},
        h('line',{x1:padL,x2:W-padR,y1:yFor(v),y2:yFor(v),stroke:'var(--line)','strokeWidth':1}),
        h('text',{x:padL-8,y:yFor(v)+4,textAnchor:'end',fontSize:11,fill:'var(--muted)'}, D.codeByVal[v]||v))),
      // target line
      target!=null? h('g',null,
        h('line',{x1:padL,x2:W-padR,y1:yFor(target),y2:yFor(target),stroke:'var(--gold)','strokeWidth':2,strokeDasharray:'6 5'}),
        h('text',{x:W-padR,y:yFor(target)-7,textAnchor:'end',fontSize:11,fontWeight:700,fill:'var(--gold)'},'期望 '+targetLabel))
      :null,
      // x date labels
      studentPts.map((p,i)=> i%labelEvery===0 || i===N-1 ? h('text',{key:'x'+i,x:xFor(i),y:H-padB+20,textAnchor:'middle',fontSize:10,fill:'var(--muted)'}, p.date.slice(5)) : null),
      // cohort line
      cohortPts.length>1? h('polyline',{points:mkPoly(cohortPts),fill:'none',stroke:'var(--peer)','strokeWidth':2,strokeDasharray:'2 4',opacity:.9}):null,
      cohortPts.map((p,i)=>h('circle',{key:'c'+i,cx:xFor(i),cy:yFor(p.v),r:2.5,fill:'var(--peer)'})),
      // student line
      studentPts.length>1? h('polyline',{points:mkPoly(studentPts),fill:'none',stroke:'var(--a)','strokeWidth':3,strokeLinejoin:'round',strokeLinecap:'round'}):null,
      studentPts.map((p,i)=>h('circle',{key:'s'+i,cx:xFor(i),cy:yFor(p.v),r:4.5,fill:'#fff',stroke:'var(--a)','strokeWidth':2.5})),
      studentPts.length===1? h('text',{x:xFor(0),y:yFor(studentPts[0].v)-12,textAnchor:'middle',fontSize:12,fontWeight:800,fill:'var(--aInk)'},D.codeByVal[studentPts[0].v]):null
    );
  }

  cohortCumAt(stage, epaId, ts, excludeId){
    const D=this.D;
    const rel=(this.state.assessments||[]).filter(a=>a.stage===stage && a.studentId!==excludeId && (epaId==='ALL'||a.epaId===epaId) && a._ts<=ts);
    const vals=rel.map(a=>D.valByCode[a.overall]).filter(v=>v!=null);
    return vals.length? vals.reduce((x,y)=>x+y,0)/vals.length : null;
  }

  exportAllCSV(){

    const q=s=>'"'+String(s==null?'':s).replace(/"/g,'""')+'"';
    const L=[['學員','期別','日期','EPA','診斷情境','評核者','整體代碼','整體數值','質性回饋'].map(q).join(',')];

  colorFor(i){ return SERIES_COLORS[i%SERIES_COLORS.length]; }
  targetLinesFor(ids){
    const D=this.D, seen={}, out=[];
    ids.forEach(id=>{const st=this.stuById(id).stage; const v=D.TARGET[st]; if(!seen[v]){seen[v]=1; out.push({v,label:D.TARGET_LABEL[st]});}});
    return out.sort((a,b)=>a.v-b.v);
  }
  // 多人趨勢折線圖（時間軸）
  multiLineChart(series, targets){
    const D=this.D, W=760,H=300,padL=40,padR=16,padT=16,padB=42;
    const allPts=series.flatMap(s=>s.pts);
    if(!allPts.length) return el('div','empty', icon('chart'), h('div',null,'所選學員尚無評核資料'));
    let minT=Math.min(...allPts.map(p=>p.ts)), maxT=Math.max(...allPts.map(p=>p.ts));
    if(minT===maxT){minT-=86400000*7;maxT+=86400000*7;}
    const xFor=t=> padL + (t-minT)/(maxT-minT)*(W-padL-padR);
    const yFor=v=> padT + (1-(v-1)/4)*(H-padT-padB);
    const fmt=ts=>{const d=new Date(ts);return (d.getMonth()+1)+'/'+d.getDate();};
    const grid=[1,2,3,4,5], xticks=5;
    return h('svg',{viewBox:'0 0 '+W+' '+H,style:{width:'100%',height:'auto',display:'block'}},
      grid.map(v=>h('g',{key:'g'+v},
        h('line',{x1:padL,x2:W-padR,y1:yFor(v),y2:yFor(v),stroke:'var(--line)','strokeWidth':1}),
        h('text',{x:padL-7,y:yFor(v)+4,textAnchor:'end',fontSize:11,fill:'var(--muted)'}, D.codeByVal[v]||v))),
      targets.map((t,i)=>h('g',{key:'t'+i},
        h('line',{x1:padL,x2:W-padR,y1:yFor(t.v),y2:yFor(t.v),stroke:'var(--gold)','strokeWidth':1.5,strokeDasharray:'6 5',opacity:.7}),
        h('text',{x:W-padR,y:yFor(t.v)-6,textAnchor:'end',fontSize:10,fontWeight:700,fill:'var(--gold)'},'期望 '+t.label))),
      Array.from({length:xticks+1}).map((_,i)=>{const t=minT+(maxT-minT)*i/xticks;return h('text',{key:'x'+i,x:xFor(t),y:H-padB+20,textAnchor:'middle',fontSize:10,fill:'var(--muted)'},fmt(t));}),
      series.map((s,si)=> s.pts.length>1? h('polyline',{key:'l'+si,points:s.pts.map(p=>xFor(p.ts)+','+yFor(p.v)).join(' '),fill:'none',stroke:s.color,'strokeWidth':2.6,strokeLinejoin:'round',strokeLinecap:'round'}):null),
      series.flatMap((s,si)=> s.pts.map((p,pi)=>h('circle',{key:'d'+si+'_'+pi,cx:xFor(p.ts),cy:yFor(p.v),r:3.6,fill:'#fff',stroke:s.color,'strokeWidth':2})))
    );
  }
  // 多人柱狀圖（各 EPA 最新等級分組）
  groupedBars(sel, targets){
    const D=this.D, W=760,H=300,padL=40,padR=14,padT=16,padB=46;
    const groups=D.EPAS, n=Math.max(1,sel.length);
    const gw=(W-padL-padR)/groups.length;
    const barAreaW=gw*0.72, bw=barAreaW/n;
    const yFor=v=> padT+(1-v/5)*(H-padT-padB);
    const base=yFor(0);
    return h('svg',{viewBox:'0 0 '+W+' '+H,style:{width:'100%',height:'auto',display:'block'}},
      [0,1,2,3,4,5].map(v=>h('g',{key:'g'+v},
        h('line',{x1:padL,x2:W-padR,y1:yFor(v),y2:yFor(v),stroke:'var(--line)','strokeWidth':1}),
        h('text',{x:padL-7,y:yFor(v)+4,textAnchor:'end',fontSize:11,fill:'var(--muted)'}, v===0?'0':(D.codeByVal[v]||v)))),
      targets.map((t,i)=>h('line',{key:'t'+i,x1:padL,x2:W-padR,y1:yFor(t.v),y2:yFor(t.v),stroke:'var(--gold)','strokeWidth':1.5,strokeDasharray:'6 5',opacity:.7})),
      groups.map((e,gi)=>{
        const gx=padL+gi*gw+(gw-barAreaW)/2;
        return h('g',{key:e.id},
          h('text',{x:padL+gi*gw+gw/2,y:H-padB+20,textAnchor:'middle',fontSize:11,fontWeight:700,fill:'var(--sub)'},'EPA'+e.no),
          sel.map((id,si)=>{
            const a=this.latestPerEpa(id)[e.id], v=a?D.valByCode[a.overall]:null;
            const x=gx+si*bw;
            if(v==null) return h('rect',{key:si,x:x+1,y:base-2,width:bw-2,height:2,fill:'var(--line)'});
            return h('g',{key:si},
              h('rect',{x:x+1,y:yFor(v),width:bw-2,height:base-yFor(v),rx:2,fill:this.colorFor(si)}),
              h('text',{x:x+bw/2,y:yFor(v)-4,textAnchor:'middle',fontSize:9,fontWeight:700,fill:this.colorFor(si)}, a.overall));
          })
        );
      })
    );
  }

  // ---- 名冊 CRUD ----
  openStuForm(sid){
    const s = sid? (this.state.students.find(x=>x.id===sid)) : null;
    this.setState({ stuForm: s? {...s, _edit:true} : { id:'', name:'', track:'PGY', startDate:new Date().toISOString().slice(0,10), active:true, _edit:false } });
  }
  saveStuForm(){
    const f=this.state.stuForm;
    if(!f.name||!f.name.trim()){ this.toast('請輸入學員姓名'); return; }
    if(!f.startDate){ this.toast('請選擇起訓日期'); return; }
    const rec={ id:f.id||('s'+Date.now()), name:f.name.trim(), track:f.track, startDate:f.startDate, active:f.active!==false };
    this.setState(s=>{
      const list=s.students.slice();
      const i=list.findIndex(x=>x.id===rec.id);
      if(i>=0) list[i]=rec; else list.push(rec);
      // 若正在填評核表單且尚未選學員，自動帶入新建學員
      let draft=s.draft;
      if(draft && !f._edit && !draft.studentId){ draft={...draft, studentId:rec.id}; }
      return { students:list, stuForm:null, draft };
    }, ()=>this.saveStore());
    this.toast(f._edit? '已更新學員資料' : '已新增學員');
    return rec.id;
  }
  toggleStudentActive(sid){
    this.setState(s=>({students:s.students.map(x=>x.id===sid?{...x,active:x.active===false}:x)}), ()=>this.saveStore());
  }
  deleteStudent(sid){
    const n=this.studentAssessments(sid).length;
    if(n>0){ this.toast('此學員已有 '+n+' 筆評核，請改用「停訓」保留紀錄'); return; }
    this.setState(s=>({students:s.students.filter(x=>x.id!==sid)}), ()=>this.saveStore());
    this.toast('已刪除學員');
  }
  addTeacher(name){
    const t=(name||'').trim(); if(!t) return;
    if(this.state.teachers.includes(t)){ this.toast('此老師已在名冊'); return; }
    this.setState(s=>({teachers:[...s.teachers,t], teacherForm:''}), ()=>this.saveStore());
    this.toast('已新增老師：'+t);
  }
  removeTeacher(name){
    this.setState(s=>({teachers:s.teachers.filter(t=>t!==name)}), ()=>this.saveStore());
  }

              ...D.EPAS.map(e=>{const a=r.lp[e.id],v=a?D.valByCode[a.overall]:null,col=this.lvColor(v);
                return h('td',{key:e.id,style:{textAlign:'center'}}, h('span',{className:'lvpill',style:{background:col.bg,color:col.fg,fontSize:11,padding:'2px 8px'}}, v!=null?a.overall:'—'));}),
              h('td',{className:'num',style:{textAlign:'center'}}, r.repCode? h('span',{className:'lvpill',style:{background:this.lvColor(r.repV).bg,color:this.lvColor(r.repV).fg,fontSize:11.5}}, r.repCode):'—'),
              h('td',{style:{textAlign:'center'}}, r.meet? h('span',{className:'chip stage'},'✓'):h('span',{className:'chip gold'}, r.repV!=null&&r.target-r.repV>0?'差'+(r.target-r.repV).toFixed(2).replace(/0+$/,'').replace(/\.$/,''):'—')),
              h('td',{style:{textAlign:'center'}}, h('span',{className:'chip '+(r.ctxMet===4?'stage':'gold'),title:'已達情境門檻的 EPA 數'}, r.ctxMet+' / 4'))
            );})
          )
        )
      ),
      this.state.mSel.length? this.renderCompare() : h('p',{style:{fontSize:12.5,color:'var(--muted)',margin:'14px 2px 0',display:'flex',alignItems:'center',gap:8}}, icon('chart'),'勾選左側核取方塊（可多選），即可比較同儕的趨勢圖或柱狀圖。'),
      h('p',{style:{fontSize:12,color:'var(--muted)',marginTop:14}},'點選任一列可檢視該學員的成長趨勢與回饋歷程。')
    );
  }
}
</script>
